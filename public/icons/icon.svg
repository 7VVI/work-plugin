<svg width="512" height="512" viewBox="0 0 512 512"
     fill="none"
     xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- 主背景渐变 -->
    <linearGradient id="bgGradient"
                    x1="80"
                    y1="20"
                    x2="430"
                    y2="480"
                    gradientUnits="userSpaceOnUse">

      <stop stop-color="#3B82F6"/>
      <stop offset="1"
            stop-color="#0057E7"/>

    </linearGradient>


    <!-- 文件夹渐变 -->
    <linearGradient id="folderGradient"
                    x1="120"
                    y1="150"
                    x2="390"
                    y2="390"
                    gradientUnits="userSpaceOnUse">

      <stop stop-color="#FFFFFF"
            stop-opacity="0.35"/>

      <stop offset="1"
            stop-color="#FFFFFF"
            stop-opacity="0.12"/>

    </linearGradient>


    <!-- 阴影 -->
    <filter id="shadow"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%">

      <feDropShadow
          dx="0"
          dy="20"
          stdDeviation="25"
          flood-color="#003B9A"
          flood-opacity="0.35"/>

    </filter>


  </defs>


  <!-- 外层蓝色圆角背景 -->

  <rect
      x="32"
      y="32"
      width="448"
      height="448"
      rx="110"
      fill="url(#bgGradient)"
      filter="url(#shadow)"
  />


  <!-- 文件夹 -->

  <path
      d="
      M120 190
      C120 168 138 150 160 150
      H220
      L260 190
      H360
      C382 190 400 208 400 230
      V350
      C400 372 382 390 360 390
      H160
      C138 390 120 372 120 350
      Z"
      fill="url(#folderGradient)"
  />


  <!-- 文件夹高光 -->

  <path
      d="
      M160 165
      H220
      L250 195
      H360"
      stroke="white"
      stroke-opacity="0.35"
      stroke-width="8"
      stroke-linecap="round"
  />


  <!-- 终端 > 符号 -->

  <path
      d="
      M190 240
      L260 310
      L190 380"
      stroke="white"
      stroke-width="32"
      stroke-linecap="round"
      stroke-linejoin="round"
  />


  <!-- 下划线 -->

  <rect
      x="275"
      y="340"
      width="100"
      height="30"
      rx="15"
      fill="white"
  />


</svg>
